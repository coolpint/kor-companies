name: Weekly Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "51 6 * * 5"

permissions:
  contents: write

jobs:
  healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare directories
        run: mkdir -p reports/health/archive

      - name: Validate Teams secret
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          test -n "${TEAMS_WEBHOOK_URL}" || (echo "Missing TEAMS_WEBHOOK_URL secret" && exit 1)

      - name: Run weekly health check
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python -m src.weekly_healthcheck

      - name: Commit updated health reports
        run: |
          branch="${GITHUB_REF_NAME:-main}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/health
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update weekly health reports"
          git pull --rebase origin "${branch}"
          git push origin "${branch}"
